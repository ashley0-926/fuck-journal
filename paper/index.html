---
layout: default
title: Article
permalink: /paper/
---

<div id="articles-loading" class="articles-loading">
  <div class="loading-spinner"></div>
  <p>Loading the article... 加载文章中...</p>
</div>

<div class="journal-article" data-issue-id="">
  <div class="article-header">
    <div class="article-meta">
      <span class="article-category"></span>
      <span class="article-date"></span>
    </div>
    <h1 class="article-title"></h1>
    <div class="article-authors"></div>
    <div class="article-views" id="article-views"></div>
  </div>
  <div class="article-abstract" id="article-abstract">
    <h2>Abstract 摘要</h2>
    <div class="abstract-content"></div>
  </div>

  <div class="article-body">
    <h2>Body 正文</h2>
    <div class="article-content"></div>
  </div>
  <div class="article-references">
    <h2>References 参考文献</h2>
    <div class="references-content"></div>
  </div>
</div>

<div class="reactions-section" id="reactions-section">
  <h2>Rate this Paper 评价论文</h2>
  <div class="reactions-bar" id="reactions-bar"></div>
</div>

<div class="comments-section" id="comments-section">
  <h2>Peer Review 同行评议</h2>
  <div class="comment-form" id="comment-form">
    <div class="form-group">
      <label for="comment-author">Your Name 你的名字</label>
      <input type="text" id="comment-author" placeholder="e.g. Anonymous Reviewer">
    </div>
    <div class="form-group">
      <label for="comment-body">Comment 评论</label>
      <textarea id="comment-body" rows="4" placeholder="Write your peer review... 写下你的同行评议..."></textarea>
    </div>
    <button class="btn" id="comment-submit">Submit Review 提交评议</button>
    <div id="comment-status" class="form-status" style="display:none;"></div>
  </div>
  <div class="comments-list" id="comments-list">
    <p class="comments-loading">Loading comments... 加载评论中...</p>
  </div>
</div>

<div class="article-navigation">
  <a href="{{ '/' | relative_url }}" class="btn">&larr; Back to Journal 返回首页</a>
</div>
